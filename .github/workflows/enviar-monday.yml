name: Enviar Inventario a Monday
 
on:
  repository_dispatch:
    types: [enviar-inventario]
 
jobs:
  enviar:
    runs-on: ubuntu-latest
 
    steps:
      - name: Enviar productos a Monday
        env:
          MONDAY_API_KEY: ${{ secrets.MONDAY_API_KEY }}
        run: |
          python3 << 'EOF'
          import os
          import json
          import urllib.request
          import urllib.error
 
          API_KEY  = os.environ["MONDAY_API_KEY"]
          payload  = json.loads(os.environ.get("PAYLOAD", "{}"))
          productos = payload.get("productos", [])
          board_id  = payload.get("board_id", 0)
 
          headers = {
              "Content-Type": "application/json",
              "Authorization": API_KEY,
              "API-Version": "2024-01"
          }
 
          errores = 0
          for p in productos:
              column_values = json.dumps({
                  p["col_proveedor"]: {"index": p["proveedor_index"]},
                  p["col_producto"]:  {"ids": [p["producto_id"]]},
                  p["col_inventario"]: str(p["inventario"])
              })
 
              query = """
              mutation {
                create_item (
                  board_id: %d,
                  item_name: "%s",
                  column_values: %s
                ) { id }
              }
              """ % (board_id, p["nombre"].replace('"', "'"), json.dumps(column_values))
 
              body = json.dumps({"query": query}).encode("utf-8")
              req  = urllib.request.Request(
                  "https://api.monday.com/v2",
                  data=body,
                  headers=headers,
                  method="POST"
              )
 
              try:
                  with urllib.request.urlopen(req) as res:
                      data = json.loads(res.read())
                      if "errors" in data:
                          print(f"ERROR en {p['nombre']}: {data['errors']}")
                          errores += 1
                      else:
                          print(f"OK: {p['nombre']}")
              except Exception as e:
                  print(f"EXCEPCION en {p['nombre']}: {e}")
                  errores += 1
 
          print(f"\nResumen: {len(productos) - errores} enviados, {errores} errores.")
          EOF
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
