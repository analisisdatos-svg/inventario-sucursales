<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --border: #e2ddd6;
    --text: #1a1815;
    --muted: #8a8178;
    --accent: #2d5a3d;
    --accent-light: #e8f0eb;
    --danger: #c0392b;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page-wrap { max-width: 820px; margin: 0 auto; }

  header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .brand {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  header h1 { font-size: 26px; font-weight: 600; line-height: 1.2; }

  .sucursal-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 99px;
    white-space: nowrap;
    margin-top: 4px;
  }

  .meta { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  thead th {
    background: #f9f8f5;
    padding: 10px 14px;
    text-align: left;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  thead th:nth-child(1) { width: 42px; }
  thead th:nth-child(2) { width: 32%; }
  thead th:nth-child(3) { width: 40%; }
  thead th:nth-child(4) { width: 18%; text-align: right; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #faf9f7; }

  tbody td { padding: 8px 14px; font-size: 13px; vertical-align: middle; }

  .row-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  .proveedor-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 10px;
    border-radius: 99px;
    white-space: nowrap;
  }

  .p-amazon    { background: #fff3cd; color: #7d5a00; }
  .p-felix     { background: #fce4ec; color: #880e4f; }
  .p-lala      { background: #e3f2fd; color: #0d47a1; }
  .p-cuadritos { background: #f3e5f5; color: #4a148c; }
  .p-gdl       { background: #e8f5e9; color: #1b5e20; }
  .p-gelato    { background: #e0f7fa; color: #006064; }
  .p-maracuya  { background: #fff8e1; color: #f57f17; }
  .p-pama      { background: #fbe9e7; color: #bf360c; }
  .p-sams      { background: #e8eaf6; color: #1a237e; }
  .p-walmart   { background: #f1f8e9; color: #33691e; }
  .p-evian     { background: #e1f5fe; color: #01579b; }
  .p-sulisa    { background: #fce4ec; color: #880e4f; }

  .producto-name { color: var(--text); font-size: 13px; }

  .inv-input {
    width: 80px;
    text-align: right;
    font-family: var(--mono);
    font-size: 13px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    float: right;
  }
  .inv-input:focus { border-color: var(--accent); background: #fff; }

  .footer-bar {
    margin-top: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .footer-note { font-size: 12px; color: var(--muted); }

  #btn-enviar {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    padding: 10px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  #btn-enviar:hover { opacity: 0.88; }
  #btn-enviar:active { transform: scale(0.97); }
  #btn-enviar:disabled { opacity: 0.5; cursor: not-allowed; }

  #mensaje {
    margin-top: 1.25rem;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    display: none;
  }
  #mensaje.ok    { background: var(--accent-light); color: var(--accent); display: block; }
  #mensaje.error { background: #fdecea; color: var(--danger); display: block; }

  .progress-wrap { margin-top: 1rem; display: none; }
  .progress-wrap.visible { display: block; }
  .progress-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-family: var(--mono); }
  .progress-bar-bg { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; width: 0%; transition: width 0.3s; }
</style>
</head>

const tbody = document.getElementById("tabla-body");

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="row-num">${i + 1}</td>
    <td><span class="proveedor-pill ${p.clase}">${p.proveedor}</span></td>
    <td class="producto-name">${p.nombre}</td>

  `;
  tbody.appendChild(tr);
});

// ─── Enviar a GitHub Actions ──────────────────────────────────────
document.getElementById("btn-enviar").addEventListener("click", async () => {
  const btn          = document.getElementById("btn-enviar");
  const msgEl        = document.getElementById("mensaje");
  const progressWrap = document.getElementById("progress-wrap");
  const progressBar  = document.getElementById("progress-bar");
  const progressLabel= document.getElementById("progress-label");

  btn.disabled = true;
  btn.textContent = "Enviando...";
  msgEl.className = "";
  msgEl.style.display = "none";
  progressWrap.classList.add("visible");
  progressLabel.textContent = "Preparando datos...";
  progressBar.style.width = "10%";

  const inputs = document.querySelectorAll(".inv-input");
  const productos = PRODUCTOS.map((p, i) => ({
    nombre:           p.nombre,
    proveedor_index:  PROVEEDORES_INDEX[p.proveedor] || 0,
    producto_id:      PRODUCTOS_IDS[p.nombre] || 1,
    inventario:       parseInt(inputs[i].value) || 0,
    col_proveedor:    COLUMN_PROVEEDOR,
    col_producto:     COLUMN_PRODUCTO,
    col_inventario:   COLUMN_INVENTARIO
  }));

  try {
    progressLabel.textContent = "Enviando a GitHub Actions...";
    progressBar.style.width = "40%";

    const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/dispatches`, {
      method: "POST",
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": `Bearer ${GITHUB_TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        event_type: "enviar-inventario",
        client_payload: {
          board_id: BOARD_ID,
          productos: productos
        }
      })
    });

    progressBar.style.width = "100%";

    if (res.status === 204) {
      progressLabel.textContent = "¡Enviado correctamente!";
      msgEl.className = "ok";
      msgEl.textContent = `✅ ${productos.length} productos enviados a Monday correctamente.`;
    } else {
      const err = await res.json();
      msgEl.className = "error";
      msgEl.textContent = `❌ Error al disparar GitHub Actions: ${err.message}`;
    }
  } catch (e) {
    msgEl.className = "error";
    msgEl.textContent = `❌ Error de red: ${e.message}`;
  }

  btn.disabled = false;
  btn.textContent = "Enviar a Monday →";
});
</script>
